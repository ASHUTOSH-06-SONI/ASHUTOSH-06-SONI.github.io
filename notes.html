<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Space — Ashutosh Soni</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --link: #111111;
    }

    [data-theme="dark"] {
      --bg: #111111;
      --text: #eeeeee;
      --muted: #888888;
      --link: #eeeeee;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.25rem;
      line-height: 1.8;
      transition: background 0.2s, color 0.2s;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 5rem 1.5rem 6rem;
    }

    nav {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 3rem;
      font-size: 1rem;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
    }

    nav a:hover, nav a.active { color: var(--text); }

    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 0 0 3rem;
    }

    [data-theme="dark"] hr { border-top-color: #222222; }

    h1 {
      font-size: 1.6rem;
      font-weight: 500;
      margin-bottom: 0.15rem;
      letter-spacing: -0.01em;
    }

    .tagline {
      color: var(--muted);
      font-style: italic;
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .post {
      margin-bottom: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid #e8e8e8;
    }

    [data-theme="dark"] .post { border-bottom-color: #1e1e1e; }
    .post:last-of-type { border-bottom: none; }

    .post h2 {
      font-size: 1.25rem;
      font-weight: 500;
      margin-bottom: 0.15rem;
      letter-spacing: -0.01em;
      line-height: 1.4;
    }

    .post h2 a {
      color: var(--text);
      text-decoration: none;
    }

    .post h2 a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: #aaaaaa;
    }

    .post-meta {
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 0.5rem;
    }

    .post-tagline {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .tags {
      margin-top: 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 0.8rem;
    }

    .tag {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      font-style: italic;
    }

    .tag::before { content: "#"; }
    .tag:hover { color: var(--text); }

    .empty {
      color: var(--muted);
      font-style: italic;
      font-size: 1rem;
    }

    .toggle {
      position: fixed;
      top: 1.4rem;
      right: 1.5rem;
      background: none;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      border-radius: 3px;
      transition: color 0.2s, border-color 0.2s;
    }

    .toggle:hover { color: var(--text); border-color: var(--text); }
  </style>
</head>
<body>
  <button class="toggle" onclick="toggleTheme()">◐</button>

  <div class="wrap">
    <nav>
        <a href="/index.html">about</a>
      <a href="/notes.html" class="active">notes</a>
    </nav>

    <hr />

    <h1>Mind Space</h1>
    <p class="tagline">Personal writing — thoughts, reflections.</p>

    <!-- Add posts below. Copy a .post block for each new entry. -->

    <!--
    <div class="post">
      <h2><a href="/notes/your-note-slug.html">Your Note Title Here</a></h2>
      <p class="post-meta">2026-03-15 · Ashutosh Soni</p>
      <p class="post-tagline">One line about what this is.</p>
      <div class="tags">
        <a class="tag" href="#">life</a>
        <a class="tag" href="#">random</a>
      </div>
    </div>
    -->

    <p class="empty">Nothing yet — soon.</p>

  </div>

  <script>
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>
</body>
</html>
